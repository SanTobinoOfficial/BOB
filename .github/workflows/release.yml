name: Build & Release
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Wersja release (np. v1.4.1)'
        required: true
        type: string
jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Test trigger
        run: echo "Workflow dziala! Ref=${{ github.ref_name }}"
        shell: pwsh
