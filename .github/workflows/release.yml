# ============================================================================
#  release.yml  –  Kompilacja SlapBattlesMultiMacro.ahk → .exe + GitHub Release
#  Wyzwalacz: nowy tag v*.*.* LUB ręczne uruchomienie z GitHub UI
# ============================================================================

name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Wersja release (np. v1.4.1)'
        required: true
        type: string
      prerelease:
        description: 'Oznacz jako pre-release?'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      release_notes:
        description: 'Notatki do release (opcjonalne)'
        required: false
        type: string

jobs:
  build:
    name: Kompilacja AHK → EXE i tworzenie release
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repozytorium
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Ustal wersję ────────────────────────────────────────────────────
      - name: Ustal wersję
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $ver = "${{ github.event.inputs.version }}"
            if (-not $ver.StartsWith("v")) { $ver = "v$ver" }
            echo "VERSION=$ver" >> $env:GITHUB_OUTPUT
            echo "IS_PRERELEASE=${{ github.event.inputs.prerelease }}" >> $env:GITHUB_OUTPUT
          } else {
            echo "VERSION=${{ github.ref_name }}" >> $env:GITHUB_OUTPUT
            echo "IS_PRERELEASE=false" >> $env:GITHUB_OUTPUT
          }

      # ── 3. Utwórz tag (tylko przy manual dispatch) ─────────────────────────
      - name: Utwórz tag (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ver = "${{ steps.version.outputs.VERSION }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          $existing = git tag -l $ver
          if (-not $existing) {
            git tag $ver
            git push origin $ver
            Write-Host "Tag $ver utworzony i wypchnięty."
          } else {
            Write-Host "Tag $ver już istnieje — pomijam."
          }

      # ── 4. Zainstaluj AutoHotkey v2 przez Chocolatey ───────────────────────
      - name: Zainstaluj AutoHotkey v2
        shell: cmd
        run: choco install autohotkey --version=2.0.19 -y --no-progress

      # ── 5. Skompiluj makro AHK → EXE ──────────────────────────────────────
      - name: Kompiluj SlapBattlesMultiMacro.ahk
        shell: pwsh
        run: |
          $compiler = @(
            "C:\Program Files\AutoHotkey\Compiler\Ahk2Exe.exe",
            "C:\Program Files\AutoHotkey\v2\Compiler\Ahk2Exe.exe",
            "C:\ProgramData\chocolatey\lib\autohotkey\tools\Compiler\Ahk2Exe.exe"
          ) | Where-Object { Test-Path $_ } | Select-Object -First 1

          if (-not $compiler) {
            Write-Error "Nie znaleziono Ahk2Exe.exe!"
            Get-ChildItem "C:\Program Files\AutoHotkey\" -Recurse -Filter "*.exe" | Select-Object FullName
            exit 1
          }

          Write-Host "Kompilator: $compiler"
          & $compiler /in "SlapBattlesMultiMacro.ahk" /out "SlapBattlesMultiMacro.exe" /compress 2

          if (!(Test-Path "SlapBattlesMultiMacro.exe")) {
            Write-Error "Kompilacja nie powiodła się!"
            exit 1
          }
          Write-Host "OK — SlapBattlesMultiMacro.exe gotowy."

      # ── 6. Przygotuj notatki release ───────────────────────────────────────
      - name: Przygotuj notatki release
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.VERSION }}"
          $custom = "${{ github.event.inputs.release_notes }}"
          if ($custom) {
            $body = $custom
          } else {
            $body = @"
## Slap Battles Multi Macro $ver

### Instalacja
1. Pobierz ``SlapBattlesMultiMacro.exe``
2. Uruchom i zaakceptuj Warunki Użytkowania
3. Wpisz klucz licencyjny (otrzymasz od administratora)
4. Poczekaj na aktywację HWID
5. Uruchom ponownie i wybierz moduł

### Wymagania
- Windows 10 / 11
- Roblox uruchomiony przed startem makra

> Plik exe zawiera wbudowane środowisko AutoHotkey — nie wymaga instalacji AHK.
"@
          }
          $body | Out-File -FilePath "release_notes.md" -Encoding utf8

      # ── 7. Utwórz Release i wgraj exe ─────────────────────────────────────
      - name: Utwórz Release i wgraj SlapBattlesMultiMacro.exe
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.VERSION }}"
          $pre = "${{ steps.version.outputs.IS_PRERELEASE }}"
          $preFlag = if ($pre -eq "true") { "--prerelease" } else { "" }

          # Usuń istniejący release jeśli jest (żeby nie duplikować)
          gh release delete $ver --yes 2>$null

          if ($preFlag) {
            gh release create $ver "SlapBattlesMultiMacro.exe" `
              --title "Slap Battles Multi Macro $ver" `
              --notes-file "release_notes.md" `
              --prerelease
          } else {
            gh release create $ver "SlapBattlesMultiMacro.exe" `
              --title "Slap Battles Multi Macro $ver" `
              --notes-file "release_notes.md"
          }
