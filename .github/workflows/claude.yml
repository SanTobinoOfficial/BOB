name: Claude — Asystent Repo

on:
  # 1. Wywołanie ręczne z GitHub UI — wpisz co chcesz żeby Claude zrobił
  workflow_dispatch:
    inputs:
      task:
        description: 'Co ma zrobić Claude? (np. "zaktualizuj release notes do v1.5.0", "dodaj nowy klucz do ToS")'
        required: true
        type: string

  # 2. Komentarz w issue lub PR zawierający "@claude"
  issue_comment:
    types: [created]

  # 3. Nowe issue oznaczone tagiem "claude"
  issues:
    types: [opened, labeled]

  # 4. Komentarz recenzji PR
  pull_request_review_comment:
    types: [created]

jobs:
  claude:
    # Dla issue_comment i pull_request_review_comment — uruchom tylko gdy jest "@claude"
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' && (
        github.event.action == 'opened' && contains(github.event.issue.body, '@claude') ||
        github.event.action == 'labeled' && github.event.label.name == 'claude'
      )) ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))

    runs-on: ubuntu-latest
    permissions:
      contents: write        # Claude może commitować zmiany
      issues: write          # Claude może komentować issues
      pull-requests: write   # Claude może komentować PR
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0     # Pełna historia git dla Claude

      # Ustaw prompt dla workflow_dispatch
      - name: Ustaw zadanie (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "CLAUDE_TASK=${{ github.event.inputs.task }}" >> $GITHUB_ENV

      # Wywołaj Claude Code Action
      - name: Claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

          # Kontekst projektu — Claude wie co robi
          system_prompt: |
            Jesteś asystentem tego repozytorium (SlapBattles Multi Macro + Bot Discord).
            Struktura repo:
            - SlapBattlesMultiMacro.ahk — makro AutoHotkey v2 do gry Slap Battles na Roblox
            - SerwerIBot/main.py — bot Discord do zarządzania licencjami HWID
            - SerwerIBot/panel.html — panel webowy admina
            - docs/ToS.md — Warunki Korzystania (PL)
            - docs/PrivacyPolicy.md — Polityka Prywatności (PL)
            - .github/workflows/release.yml — budowanie i publikowanie release z plikiem exe
            - licenses.json — baza kluczy (NIGDY nie commituj tego pliku, jest w .gitignore)

            Zasady:
            1. Pisz po polsku, chyba że kod wymaga angielskiego.
            2. Commituj zmiany z opisowymi wiadomościami po polsku.
            3. Nigdy nie modyfikuj .gitignore ani pliku licenses.json.
            4. Przy aktualizacji dokumentów (ToS, PP) zachowaj strukturę Markdown.
            5. Przy aktualizacji release.yml nie usuwaj istniejących wyzwalaczy.

          # Dla workflow_dispatch użyj podanego zadania
          # Dla pozostałych zdarzeń — claude-code-action sam wyciągnie kontekst
          direct_prompt: ${{ github.event_name == 'workflow_dispatch' && env.CLAUDE_TASK || '' }}

          # Maksymalna liczba tur (zapobiega nieskończonej pętli)
          max_turns: '10'

          # Pozwól Claude commitować bezpośrednio
          allowed_tools: 'Bash,Read,Edit,Write,Glob,Grep'
