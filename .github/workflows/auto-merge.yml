name: Auto-merge claude/* branches

on:
  push:
    branches:
      - 'claude/**'

jobs:
  auto-merge:
    name: Merge do main
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Konfiguracja git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge brancha do main
        run: |
          BRANCH="${{ github.ref_name }}"
          echo "Merguje $BRANCH -> main"
          git checkout main
          git pull origin main
          git merge --no-ff "origin/$BRANCH" -m "Auto-merge: $BRANCH -> main"
          git push origin main

      - name: Bump wersji i utwórz tag
        run: |
          git checkout main
          git pull origin main

          # Odczytaj aktualną wersję z pliku AHK
          VERSION=$(grep 'APP_VERSION :=' SlapBattlesMultiMacro.ahk | grep -oP 'v[0-9]+\.[0-9]+\.[0-9]+')
          if [ -z "$VERSION" ]; then
            echo "Nie znaleziono wersji w pliku AHK — pomijam."
            exit 0
          fi
          echo "Wersja w pliku: $VERSION"

          # Jeśli tag już istnieje — bump bugfix
          if git ls-remote --tags origin "refs/tags/$VERSION" | grep -q "$VERSION"; then
            MAJOR=$(echo $VERSION | grep -oP '(?<=v)\d+')
            MINOR=$(echo $VERSION | grep -oP '(?<=\.)\d+' | head -1)
            BUGFIX=$(echo $VERSION | grep -oP '\d+$')
            NEW_BUGFIX=$((BUGFIX + 1))
            NEW_VERSION="v${MAJOR}.${MINOR}.${NEW_BUGFIX}"
            echo "Tag $VERSION istnieje — bump do $NEW_VERSION"

            sed -i "s/APP_VERSION := \"${VERSION}\"/APP_VERSION := \"${NEW_VERSION}\"/" SlapBattlesMultiMacro.ahk
            git add SlapBattlesMultiMacro.ahk
            git commit -m "chore: bump version ${VERSION} → ${NEW_VERSION}"
            git push origin main
            TAG="$NEW_VERSION"
          else
            # Nowa wersja ustawiona ręcznie — użyj jej bez zmiany
            echo "Nowy tag $VERSION — używam bez bumpa."
            TAG="$VERSION"
          fi

          git tag "$TAG"
          git push origin "$TAG"
          echo "Tag $TAG wypchnięty → uruchomi release workflow."
